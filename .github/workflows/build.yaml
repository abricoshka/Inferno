name: build
on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

jobs:
  build_windows:
    name: Windows Build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            make
            diffutils
            perl
            python
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-pixman
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libslirp
            mingw-w64-x86_64-libssh
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-lzo2
            mingw-w64-x86_64-snappy
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-gnutls
            mingw-w64-x86_64-nettle
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-gtk3

      - name: Build and install LZFSE
        shell: msys2 {0}
        run: |
          git clone --depth 1 https://github.com/lzfse/lzfse.git

          cmake -S lzfse -B lzfse-build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/mingw64 \
            -DBUILD_SHARED_LIBS=ON

          cmake --build lzfse-build
          cmake --install lzfse-build

          test -f /mingw64/include/lzfse.h
          ls -la /mingw64/lib/*lzfse*

      - name: Configure
        shell: msys2 {0}
        run: |
          mkdir build
          cd build

          ../configure \
            --target-list=aarch64-softmmu,x86_64-softmmu \
            --disable-guest-agent \
            --enable-slirp \
            --enable-lzfse \
            --enable-nettle \
            --enable-gnutls \
            --enable-gtk \
            --enable-sdl \
            --disable-werror \
            --disable-qom-cast-debug \
            --disable-debug-info

      - name: Build
        shell: msys2 {0}
        run: |
          ninja -C build

      - name: Prepare Windows artifact
        shell: msys2 {0}
        run: |
          mkdir -p dist

          cp build/qemu-system-aarch64.exe dist/
          cp build/qemu-system-x86_64.exe dist/
          cp build/qemu-img.exe dist/ 2>/dev/null || true

          ldd build/qemu-system-aarch64.exe \
            | awk '/\/mingw64\// { print $3 }' \
            | sort -u \
            | xargs -r -I '{}' cp '{}' dist/

          cp -r pc-bios dist/ 2>/dev/null || true

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: inferno-windows-x86_64
          path: dist/
          if-no-files-found: error
          retention-days: 14
          
  build_linux:
    name: Linux Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: true
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential libtool ninja-build pkg-config device-tree-compiler libglib2.0-dev gnutls-bin libjpeg-turbo8-dev libpng-dev libslirp-dev libssh-dev libusb-1.0-0-dev liblzo2-dev libncurses5-dev libpixman-1-dev libsnappy-dev vde2 zstd libgnutls28-dev libgmp10 libgmp3-dev lzfse liblzfse-dev python3-pip
          pip3 install --user --upgrade meson
      - name: Build nettle 3.10.2
        run: |
          wget https://ftpmirror.gnu.org/gnu/nettle/nettle-3.10.2.tar.gz
          echo "fe9ff51cb1f2abb5e65a6b8c10a92da0ab5ab6eaf26e7fc2b675c45f1fb519b5 nettle-3.10.2.tar.gz" | sha256sum -c - || exit 1
          tar -xvf nettle-3.10.2.tar.gz
          cd nettle-3.10.2
          ./configure
          make -j$(nproc)
          sudo make install
      - name: Build
        run: |
          mkdir build
          cd build
          export PATH="$HOME/.local/bin:$PATH"
          PKG_CONFIG_PATH=/usr/local/lib64/pkgconfig ../configure --target-list=aarch64-softmmu,x86_64-softmmu --disable-guest-agent --enable-slirp --enable-lzfse --enable-nettle --enable-gnutls --disable-werror
          make -j$(nproc)

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: inferno-linux-x86_64
          path: build/
          if-no-files-found: error
          retention-days: 14

  build_macos:
    name: macOS Build
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: true
      - name: Install dependencies
        run: |
          brew install libtool meson ninja pkgconf dtc glib gnutls jpeg-turbo libpng libslirp libssh libusb lzo ncurses nettle pixman snappy vde zstd lzfse nettle
      - name: Build
        run: |
          mkdir build && cd build
          LIBTOOL="glibtool" ../configure --target-list=aarch64-softmmu,x86_64-softmmu --disable-guest-agent --enable-lzfse --enable-slirp --enable-curses --enable-libssh --enable-virtfs --enable-zstd --extra-cflags=-DNCURSES_WIDECHAR=1 --disable-sdl --disable-gtk --enable-cocoa --enable-lzfse --enable-nettle --enable-gnutls --disable-werror --extra-cflags="-I/opt/homebrew/include" --extra-ldflags="-L/opt/homebrew/lib"
          make -j$(sysctl -n hw.logicalcpu)

  build_macos_x86_64:
    name: macOS Build (Intel)
    runs-on: macos-26-intel
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: true
      - name: Install dependencies
        run: |
          brew install libtool meson ninja pkgconf dtc glib gnutls jpeg-turbo libpng libslirp libssh libusb lzo ncurses nettle pixman snappy vde zstd lzfse nettle
      - name: Build
        run: |
          mkdir build && cd build
          LIBTOOL="glibtool" ../configure --target-list=aarch64-softmmu,x86_64-softmmu --disable-guest-agent --enable-lzfse --enable-slirp --enable-curses --enable-libssh --enable-virtfs --enable-zstd --extra-cflags=-DNCURSES_WIDECHAR=1 --disable-sdl --disable-gtk --enable-cocoa --enable-lzfse --enable-nettle --enable-gnutls --disable-werror --extra-cflags="-I/opt/homebrew/include" --extra-ldflags="-L/opt/homebrew/lib"
          make -j$(sysctl -n hw.logicalcpu)
